name: Build Installers
on:
  push:
    branches: [main, master]
  workflow_dispatch:
env:
  JAVA_VERSION: '17'
jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Generate app icons
        run: dart run flutter_launcher_icons
      - name: Accept Android licenses
        run: yes | flutter doctor --android-licenses
      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "KEYSTORE_BASE64 not set; APK will use debug signing."
            exit 0
          fi
          mkdir -p android/app
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/keystore.jks
          test -s android/app/keystore.jks
      - name: Build APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/android/app/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: mindflow-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 30
  build-windows:
    name: Build Windows executable
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop
      - name: Install dependencies
        run: flutter pub get
      - name: Generate app icons
        run: dart run flutter_launcher_icons
      - name: Build Windows
        run: flutter build windows --release
      - name: Package Windows build
        shell: pwsh
        run: |
          $candidates = @(
            'build\windows\x64\runner\Release',
            'build\windows\runner\Release'
          )
          $releaseDir = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $releaseDir) {
            Get-ChildItem -Recurse build\windows -ErrorAction SilentlyContinue | Select-Object FullName
            throw 'Windows Release output not found'
          }
          New-Item -ItemType Directory -Force -Path build\artifacts | Out-Null
          Compress-Archive -Path "$releaseDir\*" -DestinationPath build\artifacts\mindflow-windows-x64.zip -Force
      - uses: actions/upload-artifact@v4
        with:
          name: mindflow-windows-x64
          path: build/artifacts/mindflow-windows-x64.zip
          if-no-files-found: error
          retention-days: 30
